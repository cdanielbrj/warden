name: Continuous Integration

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build --tag warden:ci --file docker/Dockerfile .

      - name: Compile TypeScript inside Docker
        run: docker run --rm warden:ci npm run build
